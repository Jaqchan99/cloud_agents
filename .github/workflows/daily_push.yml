name: AI 每日资讯推送

on:
  # 不使用 GitHub cron（不可靠），由外部 cron-job.org 通过 API 触发
  workflow_dispatch:
    inputs:
      force_push:
        description: "强制推送（忽略今日已推送检测）"
        required: false
        default: "false"

jobs:
  daily-push:
    name: 推送每日 AI 资讯
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout 代码（含写入权限）
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行每日推送
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
          PUSH_CHANNEL: "discord"
          FORCE_PUSH: ${{ github.event.inputs.force_push }}
        run: |
          if [ "$FORCE_PUSH" = "true" ]; then
            python scripts/daily_push.py --force
          else
            python scripts/daily_push.py
          fi

      - name: 保存推送状态
        run: |
          git config user.name "AI News Bot"
          git config user.email "bot@github-actions"
          git add config/last_push_date.txt 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "无状态变更"
          else
            git commit -m "chore: 记录今日推送完成 [skip ci]"
            git push origin main
          fi
