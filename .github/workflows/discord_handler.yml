name: 处理 Discord 命令

on:
  schedule:
    # 每 15 分钟轮询一次用户消息（错开整点）
    - cron: "3,18,33,48 * * * *"
  workflow_dispatch:
    inputs:
      force_check:
        description: "手动检查消息"
        required: false
        default: "true"

jobs:
  handle-commands:
    name: 处理用户 Discord 消息
    runs-on: ubuntu-latest
    timeout-minutes: 5

    concurrency:
      group: discord-handler
      cancel-in-progress: false

    steps:
      - name: Checkout 代码（含最新配置）
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 处理 Discord 消息
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
        run: python scripts/discord_handler.py

      - name: 提交配置变更（如有更新）
        run: |
          git config user.name "AI News Bot"
          git config user.email "bot@github-actions"
          git add config/user_config.json config/last_discord_msg_id.txt 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "无配置变更，跳过提交"
          else
            git commit -m "chore: 自动更新用户配置 [skip ci]"
            git push origin ${{ github.ref_name }}
          fi
